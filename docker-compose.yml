version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: vistax-postgres
    environment:
      POSTGRES_DB: vistax_docscout
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - vistax-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vistax_docscout"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vistax-redis
    ports:
      - "6379:6379"
    networks:
      - vistax-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Backend (PHP-FPM)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vistax-backend
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html:cached
      - /var/www/html/vendor  # Анонимный volume для vendor (не перекрывать)
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: vistax_docscout
      DB_USERNAME: postgres
      DB_PASSWORD: secret
      REDIS_HOST: redis
      OLLAMA_BASE_URL: http://ollama:11434
    expose:
      - "9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vistax-network

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: vistax-nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html:cached
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - vistax-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Vue 3 Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vistax-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Анонимный volume для node_modules (спасает от перекрытия)
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://host.docker.internal:8000/api
      # Docker Desktop для Windows/Mac автоматически добавляет host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - nginx
    networks:
      - vistax-network
    command: npm run dev -- --host 0.0.0.0

  # Ollama AI Engine
  ollama:
    image: ollama/ollama:latest
    container_name: vistax-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - vistax-network
    # GPU опционально - закомментировать если нет NVIDIA Toolkit
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  vistax-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
