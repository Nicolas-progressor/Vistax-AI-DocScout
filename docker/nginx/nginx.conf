events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Логирование
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    client_max_body_size 10M; # Макс. размер загружаемого файла

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Upstream для PHP-FPM
    upstream php-fpm {
        server backend:9000;
    }

    # Основной сервер Laravel
    server {
        listen 80;
        server_name localhost;
        root /var/www/html/public;
        index index.php index.html;

        # CORS Headers (для фронтенда с порта 5173)
        add_header Access-Control-Allow-Origin "http://localhost:5173" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Обработка preflight запросов
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "http://localhost:5173";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With";
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain charset=UTF-8';
            add_header Content-Length 0;
            return 204;
        }

        # API маршруты (Laravel)
        location /api {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Статические файлы
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP-FPM обработка
        location ~ \.php$ {
            fastcgi_pass php-fpm;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            
            # Увеличиваем таймауты для долгих операций
            fastcgi_read_timeout 300s;
            fastcgi_send_timeout 300s;
            fastcgi_buffering off; # Отключаем буферизацию для SSE
        }

        # SSE эндпоинт для стриминга (критично!)
        location ~ ^/api/documents/.+/analyze$ {
            fastcgi_pass php-fpm;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            
            # SSE требует отключения буферизации
            fastcgi_buffering off;
            fastcgi_cache off;
            
            # Таймауты для длинного стриминга
            fastcgi_read_timeout 300s;
            fastcgi_send_timeout 300s;
            
            # Отключаем сжатие для SSE
            gzip off;
            
            # Заголовки для SSE
            add_header Content-Type 'text/event-stream';
            add_header Cache-Control 'no-cache';
            add_header Connection 'keep-alive';
            add_header Access-Control-Allow-Origin "http://localhost:5173" always;
        }

        # Защита от доступа к .git / .env
        location ~ /\. {
            deny all;
        }
    }
}
