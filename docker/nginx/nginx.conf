events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Логирование
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # DNS resolver для Docker
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    client_max_body_size 10M; # Макс. размер загружаемого файла

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Upstream для PHP-FPM
    upstream php-fpm {
        server backend:9000;
    }

    # Основной сервер Laravel
    server {
        listen 80;
        server_name localhost;
        root /var/www/html/public;
        index index.php index.html;

        # CORS Headers (для фронтенда с порта 5173)
        add_header Access-Control-Allow-Origin "http://localhost:5173" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Обработка preflight запросов
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # API маршруты (Laravel) - все запросы на index.php
        location /api {
            include fastcgi_params;
            fastcgi_pass backend:9000;
            fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
            fastcgi_param QUERY_STRING $query_string;
            fastcgi_param REQUEST_METHOD $request_method;
            fastcgi_param CONTENT_TYPE $content_type;
            fastcgi_param CONTENT_LENGTH $content_length;
            
            # SSE настройки - ПОЛНАЯ ИЗОЛЯЦИЯ ПОТОКА
            fastcgi_buffering off;
            fastcgi_cache off;
            fastcgi_read_timeout 300s;
            fastcgi_send_timeout 300s;
            fastcgi_max_temp_file_size 0;   # Запрет сброса на диск
            proxy_buffering off;
        }
            
        # PHP-FPM обработка
        location ~ \.php$ {
            fastcgi_pass backend:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            
            # Увеличиваем таймауты для долгих операций
            fastcgi_read_timeout 300s;
            fastcgi_send_timeout 300s;
            
            # ФИНАЛЬНАЯ ИЗОЛЯЦИЯ SSE-ПОТОКА
            fastcgi_buffering off;           # Отключаем буферизацию
            proxy_buffering off;             # Отключаем прокси-буферизацию
            fastcgi_max_temp_file_size 0;    # Запрещаем сброс чанков на диск
        }

        # Статические файлы
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Защита от доступа к .git / .env
        location ~ /\. {
            deny all;
        }
    }
}
